<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Javascript Weather application</h1>
      </header>
      <main class="main">
        <div class="search">
          <div class="container">
            <form action="#" class="flex justify-between" id="weather-form">
              <div class="form-group w-50">
                <label for="city-input" class="hidden">City</label>
                <input
                  type="text"
                  id="city-input"
                  class="from-control"
                  placeholder="City"
                  required
                />
              </div>
              <div class="form-group w-25">
                <label for="date-input" class="hidden">Date</label>
                <input required type="date" id="date-input" name="date" />
              </div>

              <button id="weather-submit" type="submit" class="btn ml-auto">
                Search
              </button>
              <button type="reset" class="btn">X</button>
            </form>
          </div>
        </div>

        <div class="container">
          <div id="error-message" class="message-error" style="display: none">
            Error while retrieve data
          </div>
        </div>

        <div
          id="weather-container"
          class="weather-container flex items-center justify-center"
        ></div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
